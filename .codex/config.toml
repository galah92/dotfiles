# Docs: https://developers.openai.com/codex/config-basic
sandbox_mode = "workspace-write"
model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
suppress_unstable_features_warning = true

[notice]
fast_default_opt_out = true

[features]
collaboration_modes = true
shell_snapshot = true
multi_agent = true
apps = true
terminal_resize_reflow = true
memories = true
goals = true

[tui]
theme = "kodansi-light"
status_line = ["model-with-reasoning", "current-dir", "context-usage", "five-hour-limit"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[projects."/home/gal_aharoni_vayyar_com/vc-backend"]
trust_level = "trusted"

[projects."/home/gal_aharoni_vayyar_com/twml"]
trust_level = "trusted"

[projects."/home/gal_aharoni_vayyar_com"]
trust_level = "trusted"
